<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JS more on arrays</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>

<body>
    <pre id="out">
    </pre>
    <button id="runBtn" class="px-3 py-1 rounded mt-2 mb-2 bg-black text-white">
        Run
    </button>
    <script>
        const out = document.getElementById("out");
        function print(...args) {
            // Console
            console.log(...args);
            out.textContent += args.join("") + "\n";
        }
        function clearOut() {
            out.textContent = "";
        }

        function run() {
            clearOut();
            // Dynamic Typing , Concatenation , Type Conversion
            let value = "10";
            print("Value =" ,value,"Typeof=",typeof value);
            value = 20;
            print("Value =" ,value,"Typeof=",typeof value);

            print("'10'+5:","10"+5);
            print("'10'-5:","10"-5);

            print("'10'==10:  ","10"==10);
            print("'10'==10:  ","10"===10);

            // Datatypes
            const undefinedval = undefined;
            const nullVal = null;
            print("undefinedval = ",typeof undefval);
            print("nullVal = ",nullVal,"typeof:",typeof nullVal);
        }
        document.getElementById("runBtn").addEventListener("click", run);
    </script>
</body>

</html>
